name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"

      - name: Run syntax check
        run: npm run check
